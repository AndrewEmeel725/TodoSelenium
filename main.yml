
name: Run Selenium Test

on:
  push:
    branches:["master"]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: "11"
          cache: maven
      - uses: browser-actions/setup-firefox@v1
      - run: mvn clean test
